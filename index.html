<html>
<head>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Muli">
  <style>
    html, body {
      margin: 0;
      font-family: 'Muli', sans-serif;
    }

    #number {
      position: absolute;
      top: 0;
      left: 20;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30em;
    }

    #options {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 60px;
      display: flex;
      flex-direction: column;
      font-size: 2em;
      border: solid 2px black;
    }

    #options .option {
      width: 100%;
      height: 10%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #options .option:not(:first-child) {
      border-top: solid 2px black;
    }

    #options .option:nth-child(1) {
      background-color: rgb(244, 67, 54);
    }

    #options .option:nth-child(2) {
      background-color: rgb(233, 30, 99);
    }

    #options .option:nth-child(3) {
      background-color: rgb(156, 39, 176);
    }

    #options .option:nth-child(4) {
      background-color: rgb(103, 58, 183);
    }

    #options .option:nth-child(5) {
      background-color: rgb(63, 81, 181);
    }

    #options .option:nth-child(6) {
      background-color: rgb(33, 150, 243);
    }

    #options .option:nth-child(7) {
      background-color: rgb(3, 169, 244);
    }

    #options .option:nth-child(8) {
      background-color: rgb(0, 188, 212);
    }

    #options .option:nth-child(9) {
      background-color: rgb(0, 150, 136);
    }

    #options .option:nth-child(10) {
      background-color: rgb(76, 175, 80);
    }

    #hint {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      border-radius: 50%;
      background-color: #FFEB3B;
      border: none;
      color: white;
      padding: 15px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    #hint img {
      height: 40px;
    }
  </style>
</head>
<body>
  <script>
    window.number = 1;
    window.countBy = 1;

    function updateNumber() {
      document.getElementById('number').innerHTML = window.number;
    }

    function increment() {
      if (window.number + window.countBy <= 100) {
        window.number += window.countBy;
      }
      updateNumber();
    }

    function decrement() {
      if (window.number - window.countBy > 0) {
        window.number -= window.countBy;
      }
      updateNumber();
    }

    window.addEventListener('click', ({ screenX }) => {
      if (screenX < (window.innerWidth / 2)) {
        decrement();
      } else {
        increment();
      }
    });

    window.addEventListener('keydown', ({ keyCode }) => {
      if (keyCode === 37 || keyCode === 40) {
        decrement();
      } else if (keyCode === 38 || keyCode === 39) {
        increment();
      }
      updateNumber();
    });

    function setCountBy(value) {
      window.number = value;
      window.countBy = window.number;
      updateNumber();
      document.getElementById('select').blur();
    }

    function getHint(event) {
      event.stopPropagation();
    }
  </script>

  <div id="number">
    1
  </div>

  <div id="options">
    <div class="option" onclick="setCountBy(1)">1</div>
    <div class="option" onclick="setCountBy(2)">2</div>
    <div class="option" onclick="setCountBy(3)">3</div>
    <div class="option" onclick="setCountBy(4)">4</div>
    <div class="option" onclick="setCountBy(5)">5</div>
    <div class="option" onclick="setCountBy(6)">6</div>
    <div class="option" onclick="setCountBy(7)">7</div>
    <div class="option" onclick="setCountBy(8)">8</div>
    <div class="option" onclick="setCountBy(9)">9</div>
    <div class="option" onclick="setCountBy(10)">10</div>
  </div>

  <div id="hint" onclick="getHint(event)">
    <img src="https://raw.githubusercontent.com/FortAwesome/Font-Awesome/master/svgs/regular/lightbulb.svg">
  </div>

</body>
</html>
