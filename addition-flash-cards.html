<html>
<head>
  <script src="js/global.js"></script>
  <link rel="stylesheet" href="css/flash-cards.css">
</head>
<body>
  <script>
    function newCard() {
      window.first = Math.floor(Math.random() * 10);
      window.second = Math.floor(Math.random() * 10);
      window.sum = first + second;

      document.querySelector('#card-front .top').innerText = window.first;
      document.querySelector('#card-front .middle .number').innerText = window.second;
    }

    function flipCard() {
      document.querySelector('#card-back .top').innerText = window.first;
      document.querySelector('#card-back .middle .number').innerText = window.second;
      document.querySelector('#card-back .bottom').innerText = window.sum;

      document.getElementById('flip-card').classList.toggle('flipped');

      if (!document.getElementById('flip-card').classList.contains('flipped')) {
        newCard();
      }
    }

    window.addEventListener('click', ({ screenX }) => {
      flipCard();
    });

    window.addEventListener('keydown', ({ keyCode }) => {
      if (keyCode !== 32) return;
      flipCard();
    });

    window.addEventListener('load', () => {
      newCard();
    });
  </script>

  <div id="content">
    <div id="flip-card">
      <div id="flip-card-inner">
        <div id="card-front">
          <div class="top"></div>
          <div class="middle">
            <div class="operator">
              <img src="https://raw.githubusercontent.com/FortAwesome/Font-Awesome/master/svgs/solid/plus.svg">
            </div>
            <div class="number"></div>
          </div>
          <div class="bottom">&nbsp;</div>
        </div>

        <div id="card-back">
          <div class="top"></div>
          <div class="middle">
            <div class="operator">
              <img src="https://raw.githubusercontent.com/FortAwesome/Font-Awesome/master/svgs/solid/plus.svg">
            </div>
            <div class="number"></div>
          </div>
          <div class="bottom"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
