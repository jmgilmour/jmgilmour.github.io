<html>
<head>
  <script src="js/global.js"></script>
  <script src="js/flash-cards.js"></script>
  <link rel="stylesheet" href="css/flash-cards.css">
</head>
<body>
  <script>
    function newValues() {
      window.first = Math.floor(Math.random() * 10);
      window.second = Math.floor(Math.random() * 10);
      window.result = window.first * window.second;
    }
  </script>

  <div id="content">
    <div id="flip-card">
      <div id="flip-card-inner">
        <div id="card-front">
          <div class="top"></div>
          <div class="middle">
            <div class="operator solid-times"></div>
            <div class="number"></div>
          </div>
          <div class="bottom">&nbsp;</div>
        </div>

        <div id="card-back">
          <div class="top"></div>
          <div class="middle">
            <div class="operator solid-times"></div>
            <div class="number"></div>
          </div>
          <div class="bottom"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
